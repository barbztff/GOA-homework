<!--5) კომენტარების საშვალებით დაწერეთ რა არის ატრიბუტი, რომელი ატრიბუტები იცით და რაში გამოიყენებიან. მოიყვანეთ თითოეულზე მინიმუმ 1 მაგალითი. ახსენით რა არის aspect ratio და როგორ უნდა მოვიქცეთ სურათის ზომების შეცლისას ხარისხი რომ არ გაუარესდეს--> 

<!--რა არის ატრიბუტი?
ატრიბუტი არის HTML ელემენტის თვისება, რომელიც დამატებით ინფორმაციას აწვდის ბრაუზერს. ატრიბუტები ყოველთვის იწერება ელემენტის სახელის შემდეგ და ყოველთვის შეიცავს სახელ-მნიშვნელობის (name="value") წყვილს.-->  

<!--HTML ატრიბუტები და მათი გამოყენების მაგალითები:
 href ატრიბუტი – ბმულის (ლინკის) მისამართის დასაწერად-->
<a href="https://example.com">ეწვიეთ Example.com-ს</a>
 <!--რაში გამოიყენება?
 ეს ატრიბუტი გამოიყენება a (link) ელემენტთან, რათა განსაზღვროს, თუ სად გადამისამართდება მომხმარებელი.--> 
 
<!--src ატრიბუტი – სურათის მისამართი-->
<img src="image.jpg" alt="სურათის აღწერა">
<!--რაში გამოიყენება?
src ატრიბუტი გამოიყენება img ელემენტთან, რათა მიუთითოს გამოსახულების წყარო.--> 

<!--alt ატრიბუტი – ალტერნატიული ტექსტი სურათისთვის-->
<img src="logo.png" alt="კომპანიის ლოგო">
<!--რაში გამოიყენება?
 ეს ატრიბუტი ეხმარება ბრმად მხედველ ადამიანებს და ასევე გამოიყოფება მაშინ, როცა სურათი ვერ იტვირთება.-->
